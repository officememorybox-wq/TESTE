<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Găsește-ți masa</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
    text-align:center;
}

.container{
    max-width:600px;
    margin:auto;
}

h1{
    margin-top:30px;
}

input{
    width:100%;
    padding:15px;
    font-size:20px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.result{
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    margin-top:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.masa{
    font-size:42px;
    color:green;
    font-weight:bold;
    margin:15px 0;
}

.confirm{
    background:#28a745;
    color:white;
}

.success{
    background:#d4edda;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<h1>Găsește-ți masa</h1>

<input
    id="search"
    placeholder="Introdu numele și prenumele"
>

<br><br>

<button onclick="cauta()">
Caută
</button>

<div id="rezultat" class="result"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwYWC0C4F_yIoVolP1B-J0ki_rb_Dng1Cab3zFbOdqp6HjQgEgZi-_cek7JVrgEEAKr/exec;

async function cauta(){

const nume =
document.getElementById("search").value.trim();

if(!nume){
    return;
}

const rezultat =
document.getElementById("rezultat");

rezultat.innerHTML = "Se caută...";

const response =
await fetch(
${API_URL}?action=search&name=${encodeURIComponent(nume)}
);

const data = await response.json();

if(data.length === 0){

    rezultat.innerHTML =
    "<div class='card'>Invitat negăsit.</div>";

    return;
}

let html = "";

data.forEach(invitat => {

html += `
<div class="card">

<h2>${invitat.nume}</h2>

<div class="masa">
MASA ${invitat.masa}
</div>

<button
class="confirm"
onclick="confirma(${invitat.row})">

Confirm că am ajuns

</button>

</div>
`;

});

rezultat.innerHTML = html;

}

async function confirma(row){

await fetch(
${API_URL}?action=checkin&row=${row}
);

document.getElementById("rezultat").innerHTML = `
<div class="success">
Prezența a fost înregistrată.<br><br>
Vă dorim o seară plăcută!
</div>
`;

}

</script>

</body>
</html>
